<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Contreras 2026</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="hero">

        <img src="assets/fifa.png" alt="FIFA" class="logo">

        <h1>Copa Mundial de Futbol 2026</h1>

        <p class="subtitle">
            Quiniela Contreras
        </p>

    </header>

    <section class="podio">

        <h2>Podio Final</h2>

        <div class="podio-grid">

            <div id="segundo"></div>

            <div id="primero"></div>

            <div id="tercero"></div>

        </div>

    </section>

    <section class="dashboard">

        <div class="card">
            <h2 id="participantes-count">0</h2>
            <span>👥 Participantes</span>
        </div>

        <div class="card">
            <h2 id="monto-premio">0</h2>
            <span>🏆 Premio 1er Lugar</span>
        </div>

        <div class="card">
            <h2 id="equipos-eliminados">0</h2>
            <span>⚽ Equipos vivos</span>
        </div>

        <div class="card">
            <h2 id="contador-final">---</h2>
            <span>📅 Días para la Final</span>
        </div>

    </section>

    <div id="info-datos" class="info-datos">
    Cargando información de partidos...
</div>

<section class="ranking">

    <details class="collapsible-section">

        <summary>Ranking Actual</summary>

        <div id="ranking-container"></div>

    </details>

</section>

<section class="bracket">

    <details class="collapsible-section">
        <summary>Fase de grupos</summary>

        <div id="grupos-container" class="grupos-wrapper"></div>
    </details>

    <details class="collapsible-section">
        <summary>Fase final</summary>

        <div id="bracket-container" class="knockout-wrapper"></div>
    </details>

</section>

    <div id="modal" class="modal">

        <div class="modal-content">

            <span id="cerrar-modal">&times;</span>

            <div id="modal-body"></div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
